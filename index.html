<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelman: read an argument at its strongest before you judge it</title>
  <meta name="description" content="A fair-minded thinking companion. Paste an argument, check what it does well, and find out whether something's actually wrong with it or whether it makes sense. ('Steelman' means reading an argument at its strongest before you judge it.)">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <!-- Fraunces (variable, opsz+wght), latin subset, self-hosted: no third-party request, works under
       the /steelman/ project-pages base. Relative paths on purpose. Body stays a text serif via the
       CSS fallback stack, so the unstyled/unloaded state already reads like the prior design. -->
  <link rel="preload" href="fonts/Fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Fraunces-Italic-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <!-- The two-pane reading desk (sidebar + right pane) is rendered here by src/ui.js. -->
  <div id="app">
    <noscript>
      <p style="margin:44px 48px;max-width:42rem;font:15px/1.55 system-ui,sans-serif;color:#211f1a">
        Steelman needs JavaScript to run. It does all its reasoning in your browser. Nothing is sent anywhere.
      </p>
    </noscript>
  </div>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
