<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelman — read an argument at its strongest before you judge it</title>
  <meta name="description" content="A fair-minded thinking companion. Paste an argument, check what it does well, and find out whether something's actually wrong with it — or whether it makes sense. ('Steelman' means reading an argument at its strongest before you judge it.)">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <!-- Persistent mascot host. A single <img> whose src is swapped per stage by src/mascot.js.
       Hand-made raster art drops into /mascot (see mascot/README.md). Starts hidden and stays
       hidden until a real image loads, so a missing file shows nothing rather than a broken icon.
       The app never depends on the mascot. -->
  <div id="mascot-canvas" aria-hidden="true">
    <img id="mascot-img" alt="" width="84" height="84" hidden>
  </div>
  <main id="app" aria-live="polite">
    <!-- screens are rendered here by src/ui.js -->
    <noscript>
      <section class="card">
        <h1>Steelman</h1>
        <p>This thinking companion needs JavaScript to run. It does all its reasoning in your browser — nothing is sent anywhere.</p>
      </section>
    </noscript>
  </main>
  <footer class="site-foot" hidden>
    <span>Steelman</span>
    <span class="dot">·</span>
    <span>Innocent until proven otherwise.</span>
    <span class="dot">·</span>
    <a href="https://github.com/zntznt/steelman">source</a>
  </footer>
  <!-- Steely mascot — swaps a per-stage raster image in /mascot. Self-contained; no-op until the
       art files exist. See mascot/README.md for the spec (format, size, expressions). -->
  <script defer src="src/mascot.js"></script>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
